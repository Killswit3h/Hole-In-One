name: Build Android APK

on:
  push:
    branches:
      - main
      - 'claude/**'
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build Debug & Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter (latest stable)
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Print Flutter & Dart versions
        run: flutter --version

      # This project was hand-crafted, so it lacks the files that
      # `flutter create` normally generates:
      #   - android/gradlew          (Gradle entry-point script)
      #   - android/gradle/wrapper/  (gradle-wrapper.jar + .properties)
      #   - android/settings.gradle  (contains AGP / Kotlin version numbers)
      #   - android/build.gradle     (top-level; references those versions)
      #
      # We bootstrap a throwaway project with the exact same Flutter version
      # that is running in this job, copy the infrastructure files from it,
      # then discard it.  Only android/app/build.gradle (our custom config)
      # is kept from the repo.
      - name: Bootstrap Gradle infrastructure from flutter create
        run: |
          flutter create \
            --org com.placeholder \
            --project-name golf_swing_analyzer \
            --platforms android \
            /tmp/flutter_base

          # Gradle wrapper script (required to invoke Gradle)
          cp /tmp/flutter_base/android/gradlew android/gradlew
          chmod +x android/gradlew

          # Gradle wrapper directory (gradle-wrapper.jar + gradle-wrapper.properties)
          cp -r /tmp/flutter_base/android/gradle android/

          # Top-level Gradle config — contains the AGP and Kotlin version numbers
          # that are compatible with THIS Flutter release.  Safe to copy verbatim
          # because they contain no app-specific code.
          cp /tmp/flutter_base/android/settings.gradle android/settings.gradle
          cp /tmp/flutter_base/android/build.gradle android/build.gradle

          rm -rf /tmp/flutter_base

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: golf-swing-analyzer-debug
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: golf-swing-analyzer-release
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
