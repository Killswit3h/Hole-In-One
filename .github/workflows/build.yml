name: Build Android APK

on:
  push:
    branches:
      - main
      - 'claude/**'
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # suppress Node.js 20 deprecation warning

jobs:
  build:
    name: Build Debug & Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter (latest stable)
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Print Flutter version
        run: flutter --version

      # flutter create normally generates gradlew + gradle/wrapper/.
      # Since this project was built manually those files are absent.
      # We spin up a throwaway Flutter project just to steal the wrapper,
      # then discard it.  Nothing else in our project is touched.
      - name: Bootstrap Gradle wrapper from flutter create
        run: |
          flutter create \
            --org com.placeholder \
            --project-name placeholder_app \
            --platforms android \
            /tmp/flutter_base

          # Copy gradlew script (the entry point Gradle needs)
          if [ ! -f android/gradlew ]; then
            cp /tmp/flutter_base/android/gradlew android/gradlew
            chmod +x android/gradlew
          fi

          # Copy gradle/wrapper/ directory (contains gradle-wrapper.jar + .properties)
          # -n = no-clobber: never overwrite our own gradle-wrapper.properties
          if [ ! -d android/gradle/wrapper ]; then
            mkdir -p android/gradle/wrapper
          fi
          cp -n /tmp/flutter_base/android/gradle/wrapper/gradle-wrapper.jar \
                android/gradle/wrapper/gradle-wrapper.jar || true

          rm -rf /tmp/flutter_base

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: golf-swing-analyzer-debug
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: golf-swing-analyzer-release
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
